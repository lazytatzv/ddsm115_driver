name: Bug Report
description: Report a bug or issue with the DDSM115 Driver Library
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Initialize driver with...
        2. Call function...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Ubuntu 20.04
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Debian 11
        - Debian 12
        - CentOS/RHEL 8
        - CentOS/RHEL 9
        - Arch Linux
        - Other Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler Version
      description: What compiler version are you using?
      placeholder: "g++ 11.4.0, clang++ 14.0.0, etc."
    validations:
      required: true

  - type: input
    id: boost
    attributes:
      label: Boost Version
      description: What Boost version are you using?
      placeholder: "1.74, 1.81, etc."
    validations:
      required: true

  - type: dropdown
    id: ros2
    attributes:
      label: ROS2 Distribution (if applicable)
      description: If using ROS2 wrapper, which distribution?
      options:
        - Not using ROS2
        - Humble
        - Iron
        - Jazzy
        - Rolling
        - Other

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware Configuration
      description: Are you testing with actual hardware?
      options:
        - No hardware (software only)
        - Single DDSM115 motor
        - Multiple DDSM115 motors
        - Other RS485 device
    validations:
      required: true

  - type: textarea
    id: hardware_details
    attributes:
      label: Hardware Details (if applicable)
      description: Details about your hardware setup
      placeholder: |
        - USB-to-RS485 converter model
        - Power supply specifications
        - Motor IDs and configuration
        - Wiring setup

  - type: textarea
    id: logs
    attributes:
      label: Error Messages/Logs
      description: Any error messages, stack traces, or log output
      render: shell
      placeholder: Paste error messages or logs here...

  - type: textarea
    id: code
    attributes:
      label: Minimal Code Example
      description: Minimal code that demonstrates the issue
      render: cpp
      placeholder: |
        #include "ddsm115_driver/ddsm115_driver.hpp"
        
        int main() {
            // Your minimal reproduction code here
            return 0;
        }

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: Add any other context, screenshots, or information here...

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Please confirm you have done the following
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided all requested information
          required: true
        - label: I can reproduce this issue consistently
          required: true
