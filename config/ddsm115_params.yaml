# Standalone DDSM115 Driver Node Configuration
ddsm115_driver_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    serial_baud: 115200
    publish_rate: 20.0        # Rate at which commands are sent and status published (Hz)
    command_timeout: 1.0       # Timeout in seconds to stop motors if no commands are received
    motor_ids: [1, 2]          # List of motor IDs connected on the RS485 bus

