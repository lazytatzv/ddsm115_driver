name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libboost-all-dev \
          pkg-config \
          zip
    
    - name: Build release
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    
    - name: Create release package
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        
        # Create source package
        git archive --format=tar.gz --prefix=ddsm115_driver-${VERSION}/ HEAD > ddsm115_driver-${VERSION}-source.tar.gz
        
        # Create binary package
        mkdir -p ddsm115_driver-${VERSION}-linux-x64/{lib,include,examples,docs}
        cp build/libddsm115_driver.so ddsm115_driver-${VERSION}-linux-x64/lib/
        cp -r include/* ddsm115_driver-${VERSION}-linux-x64/include/
        cp build/examples/basic_example ddsm115_driver-${VERSION}-linux-x64/examples/
        cp build/examples/velocity_control_example ddsm115_driver-${VERSION}-linux-x64/examples/
        cp build/examples/position_control_example ddsm115_driver-${VERSION}-linux-x64/examples/
        cp build/examples/multi_motor_example ddsm115_driver-${VERSION}-linux-x64/examples/
        cp README.md LICENSE CHANGELOG.md QUICK_REFERENCE.md ddsm115_driver-${VERSION}-linux-x64/docs/
        
        tar -czf ddsm115_driver-${VERSION}-linux-x64.tar.gz ddsm115_driver-${VERSION}-linux-x64/
        
        # Create ROS2 package
        mkdir -p ddsm115_driver-${VERSION}-ros2
        cp -r ros2_wrapper/* ddsm115_driver-${VERSION}-ros2/
        tar -czf ddsm115_driver-${VERSION}-ros2.tar.gz ddsm115_driver-${VERSION}-ros2/
    
    - name: Extract release notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        
        # Extract release notes from CHANGELOG.md
        awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
        
        # If no specific notes found, create generic ones
        if [ ! -s release_notes.md ]; then
          echo "Release $VERSION of DDSM115 Driver Library" > release_notes.md
          echo "" >> release_notes.md
          echo "See CHANGELOG.md for details." >> release_notes.md
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        files: |
          ddsm115_driver-*-source.tar.gz
          ddsm115_driver-*-linux-x64.tar.gz
          ddsm115_driver-*-ros2.tar.gz
        draft: false
        prerelease: ${{ contains(github.ref, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/ddsm115_driver:latest
          ghcr.io/${{ github.repository_owner }}/ddsm115_driver:${{ github.ref_name }}
        platforms: linux/amd64,linux/arm64
